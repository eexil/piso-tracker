<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piso Tracker</title>
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e0dbd2;
    --text: #1a1a18;
    --muted: #6b6860;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --danger: #c0392b;
    --tag-bg: #eef7f2;
    --tag-text: #1a4a32;
    --font: 'Segoe UI', system-ui, sans-serif;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.1rem; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
  .logo span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  button {
    font-family: var(--font); font-size: 0.85rem; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface); color: var(--text);
    padding: 6px 14px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  button:hover { background: var(--bg); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #1f4d38; }
  button.small { padding: 4px 10px; font-size: 0.78rem; }
  button.danger { color: var(--danger); border-color: #f5c6c2; }
  button.danger:hover { background: #fdf2f1; }

  .setup-banner {
    background: #fff8e6; border: 1px solid #f5d79e; border-radius: var(--radius);
    padding: 1rem 1.25rem; margin: 1.5rem; display: flex; gap: 12px; align-items: flex-start;
  }
  .setup-banner.hidden { display: none; }
  .setup-banner h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; color: #7a4f00; }
  .setup-banner p { font-size: 0.82rem; color: #8c6020; line-height: 1.5; }
  .setup-banner input[type="text"] {
    font-family: var(--font); font-size: 0.82rem; border: 1px solid #f5d79e;
    border-radius: 6px; padding: 5px 10px; width: 100%; max-width: 480px;
    margin-top: 8px; background: #fffdf7; color: var(--text);
  }
  .setup-banner .banner-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  .filters {
    padding: 0 1.5rem 1rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  select, input[type="text"].search {
    font-family: var(--font); font-size: 0.85rem; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; background: var(--surface); color: var(--text);
  }
  input[type="text"].search { min-width: 200px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem; padding: 0 1.5rem 2rem;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    display: flex; flex-direction: column; transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  .card-photos {
    position: relative; height: 180px; background: #f0ede8; overflow: hidden; cursor: pointer;
  }
  .card-photos img { width: 100%; height: 100%; object-fit: cover; }
  .card-photos .no-photo {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--muted); font-size: 0.8rem; gap: 6px;
  }
  .card-photos .no-photo svg { opacity: 0.4; }
  .card-photos .photo-count {
    position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.55);
    color: #fff; font-size: 0.72rem; padding: 2px 7px; border-radius: 20px;
  }
  .card-photos .add-photo-hint {
    position: absolute; inset: 0; background: rgba(0,0,0,0);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.2s; font-size: 0.8rem; color: #fff;
  }
  .card-photos:hover .add-photo-hint { background: rgba(0,0,0,0.35); opacity: 1; }

  .estado-badge {
    position: absolute; top: 8px; left: 8px; font-size: 0.7rem; font-weight: 600;
    padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .estado-interesado { background: #dff4e8; color: #1a5c33; }
  .estado-visitado { background: #ddeeff; color: #1a3c6e; }
  .estado-descartado { background: #f5e8e8; color: #7a2020; }
  .estado-pendiente { background: #f5f0e0; color: #6b5010; }
  .estado-vendido { background: #ebebeb; color: #555; }
  .estado-ok { background: #e8f0e8; color: #2a4a2a; }

  .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
  .card-subtitle { font-size: 0.8rem; color: var(--muted); }
  .card-price { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .card-price span { font-size: 0.75rem; font-weight: 400; color: var(--muted); margin-left: 4px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
  .tag { background: var(--tag-bg); color: var(--tag-text); font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; }
  .tag.no { background: #fdf2f1; color: #a03020; }
  .stars { color: #e0a800; font-size: 0.85rem; letter-spacing: 1px; }
  .card-notes { font-size: 0.78rem; color: var(--muted); line-height: 1.5; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }

  .card-footer {
    padding: 8px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 6px; justify-content: flex-end; align-items: center;
  }
  .card-url {
    font-size: 0.75rem; color: var(--accent); text-decoration: none;
    margin-right: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px;
  }
  .card-url:hover { text-decoration: underline; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border-radius: var(--radius); width: 100%;
    max-width: 680px; max-height: 90vh; overflow-y: auto; padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .modal h2 { font-size: 1rem; font-weight: 600; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  input, select, textarea {
    font-family: var(--font); font-size: 0.85rem; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; background: var(--surface); color: var(--text); width: 100%;
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }

  .photo-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 1rem;
    text-align: center; color: var(--muted); font-size: 0.82rem; cursor: pointer;
    transition: border-color 0.2s; position: relative;
  }
  .photo-zone:hover, .photo-zone.dragover { border-color: var(--accent); color: var(--accent); }
  .photo-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .photo-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .photo-thumb {
    position: relative; width: 72px; height: 72px;
    border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .uploading {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 0.65rem; text-align: center;
  }
  .photo-thumb button {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
    padding: 0; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff;
    border: none; font-size: 11px; line-height: 18px; text-align: center;
  }
  .photo-thumb button:hover { background: rgba(180,0,0,0.8); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border); }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  .lightbox.hidden { display: none; }
  .lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 8px; object-fit: contain; }
  .lightbox-nav { display: flex; gap: 12px; }
  .lightbox-nav button { background: rgba(255,255,255,0.15); color: #fff; border-color: transparent; }
  .lightbox-nav button:hover { background: rgba(255,255,255,0.3); }
  .lightbox-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-state h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }

  .sync-status { font-size: 0.75rem; color: var(--muted); }
  .sync-status.ok { color: var(--accent); }
  .sync-status.err { color: var(--danger); }

  .valoracion-input { display: flex; gap: 4px; }
  .valoracion-input span { font-size: 1.2rem; cursor: pointer; opacity: 0.3; transition: opacity 0.15s; user-select: none; }
  .valoracion-input span.active { opacity: 1; }

  .upload-progress { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.triple { grid-template-columns: 1fr 1fr; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Piso Tracker <span id="piso-count"></span></div>
  <div class="header-actions">
    <span class="sync-status" id="sync-status">Sin conexión</span>
    <button onclick="openSetup()">⚙ Configurar</button>
    <button class="primary" onclick="openModal()">+ Añadir piso</button>
  </div>
</header>

<div class="setup-banner hidden" id="setup-banner">
  <div style="flex:1">
    <h3>Configuración</h3>
    <p>URL del Apps Script (para datos del Sheet y fotos en Drive):</p>
    <input type="text" id="sheet-url-input" placeholder="https://script.google.com/macros/s/XXXX/exec" />
    <div class="banner-actions">
      <button class="primary small" onclick="saveSheetUrl()">Guardar</button>
      <button class="small" onclick="closeBanner()">Cancelar</button>
    </div>
  </div>
</div>

<div class="filters">
  <input type="text" class="search" id="search" placeholder="Buscar por barrio, agencia…" oninput="renderCards()">
  <select id="filter-estado" onchange="renderCards()">
    <option value="">Todos los estados</option>
    <option>Interesado</option>
    <option>Visitado</option>
    <option>Descartado</option>
    <option>Pendiente</option>
    <option>Vendido</option>
  </select>
  <select id="filter-poblacion" onchange="renderCards()">
    <option value="">Todas las poblaciones</option>
  </select>
  <select id="sort-by" onchange="renderCards()">
    <option value="fecha">Más recientes</option>
    <option value="precio-asc">Precio ↑</option>
    <option value="precio-desc">Precio ↓</option>
    <option value="m2">m² ↓</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">Añadir piso</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Población *</label>
        <input id="f-poblacion" type="text" placeholder="Terrassa">
      </div>
      <div class="form-group">
        <label>Barrio</label>
        <input id="f-barrio" type="text">
      </div>
      <div class="form-group">
        <label>Precio (€)</label>
        <input id="f-precio" type="number" placeholder="185000">
      </div>
      <div class="form-group">
        <label>m²</label>
        <input id="f-m2" type="number" placeholder="70">
      </div>
      <div class="form-group">
        <label>Habitaciones</label>
        <input id="f-habitaciones" type="number" placeholder="3">
      </div>
      <div class="form-group">
        <label>Año construcción</label>
        <input id="f-anyo" type="number" placeholder="2000">
      </div>
    </div>

    <div class="form-grid triple">
      <div class="form-group">
        <label>Altura</label>
        <select id="f-altura">
          <option value="">—</option>
          <option>Bajo</option><option>Entresuelo</option><option>Primero</option>
          <option>Segundo</option><option>Tercero</option><option>Cuarto</option>
          <option>Quinto</option><option>Ático</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ascensor</label>
        <select id="f-ascensor"><option value="">—</option><option>Sí</option><option>No</option></select>
      </div>
      <div class="form-group">
        <label>Terraza S/N</label>
        <select id="f-terraza"><option value="">—</option><option>Sí</option><option>No</option></select>
      </div>
      <div class="form-group">
        <label>Lavadero</label>
        <select id="f-lavadero"><option value="">—</option><option>Sí</option><option>No</option></select>
      </div>
      <div class="form-group">
        <label>Parking S/N</label>
        <select id="f-parking"><option value="">—</option><option>Sí</option><option>No</option></select>
      </div>
      <div class="form-group">
        <label>Trastero S/N</label>
        <select id="f-trastero"><option value="">—</option><option>Sí</option><option>No</option></select>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Agencia</label>
        <input id="f-agencia" type="text">
      </div>
      <div class="form-group">
        <label>Portal (WEB)</label>
        <select id="f-web">
          <option value="">—</option>
          <option>Idealista</option><option>Habitaclia</option><option>Fotocasa</option>
          <option>Pisos.com</option><option>Particular</option><option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL anuncio 1</label>
        <input id="f-url1" type="text" placeholder="https://…">
      </div>
      <div class="form-group">
        <label>URL anuncio 2</label>
        <input id="f-url2" type="text" placeholder="https://…">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="f-estado">
          <option>Pendiente</option><option>Interesado</option>
          <option>Visitado</option><option>Descartado</option><option>Vendido</option>
        </select>
      </div>
      <div class="form-group">
        <label>Visita</label>
        <select id="f-visita">
          <option value="">—</option><option>Solicitada</option>
          <option>Programada</option><option>Realizada</option><option>No</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Valoración personal</label>
      <div class="valoracion-input" id="valoracion-stars">
        <span onclick="setValoracion(1)">★</span>
        <span onclick="setValoracion(2)">★</span>
        <span onclick="setValoracion(3)">★</span>
        <span onclick="setValoracion(4)">★</span>
        <span onclick="setValoracion(5)">★</span>
      </div>
    </div>

    <div class="form-group">
      <label>Notas</label>
      <textarea id="f-notas" placeholder="Observaciones, impresiones, pros y contras…"></textarea>
    </div>

    <div class="form-group">
      <label>Fotos (arrastra, pega Ctrl+V, o haz clic) — se guardan en Drive, visibles para todos</label>
      <div class="photo-zone" id="photo-zone"
           ondragover="photoDragOver(event)" ondragleave="photoDragLeave(event)" ondrop="photoDrop(event)">
        📷 Arrastra fotos aquí o haz clic para seleccionar
        <input type="file" accept="image/*" multiple onchange="photoFileInput(event)">
      </div>
      <div class="upload-progress" id="upload-progress"></div>
      <div class="photo-thumbs" id="photo-thumbs"></div>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button class="danger small" id="btn-delete" style="display:none" onclick="deleteCurrentPiso()">Eliminar</button>
      <button class="primary" id="btn-save" onclick="savePiso()">Guardar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-nav" onclick="event.stopPropagation()">
    <button onclick="lightboxPrev()">← Anterior</button>
    <button onclick="lightboxNext()">Siguiente →</button>
  </div>
</div>

<script>
let pisos = [];
let currentEditId = null;
let currentPhotos = []; // [{url, isNew, file?, localPreview?}]
let valoracion = 0;
let lightboxPhotos = [];
let lightboxIdx = 0;

const STORAGE_URL   = "pisotracker_sheeturl";
const STORAGE_LOCAL = "pisotracker_local";

function init() {
  const url = localStorage.getItem(STORAGE_URL);
  if (url) {
    document.getElementById("sheet-url-input").value = url;
    loadFromSheet();
  } else {
    pisos = JSON.parse(localStorage.getItem(STORAGE_LOCAL) || "[]");
    renderCards();
    setStatus("Sin Sheet (modo local)", "");
  }
  document.addEventListener("paste", handlePaste);
}

function sheetUrl() { return localStorage.getItem(STORAGE_URL); }

function setStatus(msg, cls) {
  const el = document.getElementById("sync-status");
  el.textContent = msg;
  el.className = "sync-status " + cls;
}

async function loadFromSheet() {
  const url = sheetUrl();
  if (!url) return;
  setStatus("Cargando…", "");
  try {
    const res = await fetch(url + "?action=getAll");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    pisos = data.rows.map(r => ({ ...r, _id: r._id || String(r._rowIndex) }));
    populateFilters();
    renderCards();
    setStatus("Conectado ✓", "ok");
  } catch(e) {
    setStatus("Error: " + e.message, "err");
    pisos = JSON.parse(localStorage.getItem(STORAGE_LOCAL) || "[]");
    renderCards();
  }
}

async function pushToSheet(piso) {
  const url = sheetUrl();
  if (!url) { saveLocal(); return; }
  const action = piso._rowIndex ? "update" : "add";
  try {
    const res = await fetch(url, { method: "POST", body: JSON.stringify({ action, ...piso }) });
    const data = await res.json();
    if (data.rowIndex) piso._rowIndex = data.rowIndex;
    if (data._id) piso._id = data._id;
    setStatus("Guardado ✓", "ok");
  } catch(e) {
    setStatus("Error al guardar: " + e.message, "err");
  }
  saveLocal();
}

async function deleteFromSheet(piso) {
  const url = sheetUrl();
  if (!url || !piso._rowIndex) return;
  try {
    await fetch(url, { method: "POST", body: JSON.stringify({ action: "delete", _rowIndex: piso._rowIndex }) });
  } catch(e) { console.error(e); }
}

function saveLocal() {
  localStorage.setItem(STORAGE_LOCAL, JSON.stringify(pisos));
}

// ---- SETUP ----
function openSetup() { document.getElementById("setup-banner").classList.toggle("hidden"); }
function closeBanner() { document.getElementById("setup-banner").classList.add("hidden"); }
function saveSheetUrl() {
  const url = document.getElementById("sheet-url-input").value.trim();
  if (!url.startsWith("https://")) { alert("URL no válida"); return; }
  localStorage.setItem(STORAGE_URL, url);
  closeBanner();
  loadFromSheet();
}

// ---- RENDER ----
function populateFilters() {
  const pobs = [...new Set(pisos.map(p => p["Poblacion"]).filter(Boolean))].sort();
  const sel = document.getElementById("filter-poblacion");
  const val = sel.value;
  sel.innerHTML = '<option value="">Todas las poblaciones</option>';
  pobs.forEach(p => { const o = document.createElement("option"); o.textContent = p; sel.appendChild(o); });
  sel.value = val;
}

function filteredPisos() {
  const q = document.getElementById("search").value.toLowerCase();
  const estado = document.getElementById("filter-estado").value;
  const pob = document.getElementById("filter-poblacion").value;
  const sort = document.getElementById("sort-by").value;
  let res = pisos.filter(p => {
    if (q && !JSON.stringify(p).toLowerCase().includes(q)) return false;
    if (estado && p["Estado"] !== estado) return false;
    if (pob && p["Poblacion"] !== pob) return false;
    return true;
  });
  if (sort === "precio-asc") res.sort((a,b) => (Number(a["Precio"])||0) - (Number(b["Precio"])||0));
  else if (sort === "precio-desc") res.sort((a,b) => (Number(b["Precio"])||0) - (Number(a["Precio"])||0));
  else if (sort === "m2") res.sort((a,b) => (Number(b["m2"])||0) - (Number(a["m2"])||0));
  return res;
}

function renderCards() {
  const grid = document.getElementById("grid");
  const list = filteredPisos();
  document.getElementById("piso-count").textContent = pisos.length ? `— ${pisos.length} pisos` : "";
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><h3>Sin resultados</h3><p>Prueba con otros filtros o añade tu primer piso.</p></div>';
    return;
  }
  grid.innerHTML = list.map(p => cardHTML(p)).join("");
}

function cardHTML(p) {
  const id = p._id;
  // Photos: stored as JSON array of Drive URLs in "Fotos" column
  let photoUrls = [];
  try { photoUrls = JSON.parse(p["Fotos"] || "[]"); } catch(e) {}
  const precio = p["Precio"] ? "€" + Number(p["Precio"]).toLocaleString("es-ES") : "";
  const m2 = p["m2"] ? p["m2"] + " m²" : "";
  const ppm2 = (p["Precio"] && p["m2"]) ? "€" + Math.round(p["Precio"]/p["m2"]) + "/m²" : "";
  const estado = p["Estado"] || "Pendiente";
  const estadoClass = "estado-" + estado.toLowerCase();

  const tags = [];
  if (p["Ascensor"] === "Sí") tags.push({label:"Ascensor", ok:true});
  if (p["Terraza Si/No"] === "Sí") tags.push({label:"Terraza", ok:true});
  if (p["Parking Si/No"] === "Sí") tags.push({label:"Parking", ok:true});
  if (p["Trastero Si/No"] === "Sí") tags.push({label:"Trastero", ok:true});
  if (p["Lavadero"] === "Sí") tags.push({label:"Lavadero", ok:true});
  if (p["Ascensor"] === "No") tags.push({label:"Sin ascensor", ok:false});
  if (p["Terraza Si/No"] === "No") tags.push({label:"Sin terraza", ok:false});
  const tagsHTML = tags.map(t => `<span class="tag${t.ok?'':' no'}">${t.label}</span>`).join("");

  const val = Number(p["Valoracion"] || 0);
  const starsHTML = val ? "★".repeat(val) + "☆".repeat(5-val) : "";

  const firstPhoto = photoUrls[0];
  const photo = firstPhoto
    ? `<img src="${firstPhoto}" alt="" onerror="this.style.display='none'">`
    : `<div class="no-photo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg><span>Sin fotos</span></div>`;

  const url1 = p["URL1"] || "";
  const urlHTML = url1 ? `<a class="card-url" href="${url1}" target="_blank">${p["WEB"] || "Ver anuncio"}</a>` : `<span></span>`;

  return `
  <div class="card" data-id="${id}">
    <div class="card-photos" onclick="openLightbox('${id}')">
      ${photo}
      <span class="estado-badge ${estadoClass}">${estado}</span>
      ${photoUrls.length > 1 ? `<span class="photo-count">${photoUrls.length} fotos</span>` : ""}
      <div class="add-photo-hint">Ver fotos</div>
    </div>
    <div class="card-body">
      <div>
        <div class="card-title">${p["Barrio"] ? p["Barrio"] + " · " : ""}${p["Poblacion"] || "—"}</div>
        <div class="card-subtitle">${[p["Altura"], p["Año"] ? p["Año"] : "", p["Agencia"]].filter(Boolean).join(" · ")}</div>
      </div>
      ${precio ? `<div class="card-price">${precio}<span>${[m2, ppm2, p["habitaciones"] ? p["habitaciones"]+" hab." : ""].filter(Boolean).join(" · ")}</span></div>` : ""}
      <div class="card-tags">${tagsHTML}</div>
      ${starsHTML ? `<div class="stars">${starsHTML}</div>` : ""}
      ${p["Notas"] ? `<div class="card-notes">${p["Notas"]}</div>` : ""}
    </div>
    <div class="card-footer">
      ${urlHTML}
      <button class="small" onclick="event.stopPropagation(); openModal('${id}')">Editar</button>
    </div>
  </div>`;
}

// ---- MODAL ----
function openModal(id) {
  currentEditId = id || null;
  valoracion = 0;
  const p = id ? pisos.find(x => x._id === id) : {};

  // Load existing photo URLs
  let photoUrls = [];
  try { photoUrls = JSON.parse(p["Fotos"] || "[]"); } catch(e) {}
  currentPhotos = photoUrls.map(url => ({ url, isNew: false }));

  document.getElementById("modal-title").textContent = id ? "Editar piso" : "Añadir piso";
  document.getElementById("btn-delete").style.display = id ? "inline-block" : "none";

  const fields = {
    "f-poblacion": p["Poblacion"] || "",
    "f-barrio": p["Barrio"] || "",
    "f-precio": p["Precio"] || "",
    "f-m2": p["m2"] || "",
    "f-habitaciones": p["habitaciones"] || "",
    "f-anyo": p["Año"] || "",
    "f-altura": p["Altura"] || "",
    "f-ascensor": p["Ascensor"] || "",
    "f-terraza": p["Terraza Si/No"] || "",
    "f-lavadero": p["Lavadero"] || "",
    "f-parking": p["Parking Si/No"] || "",
    "f-trastero": p["Trastero Si/No"] || "",
    "f-agencia": p["Agencia"] || "",
    "f-web": p["WEB"] || "",
    "f-url1": p["URL1"] || "",
    "f-url2": p["URL2"] || "",
    "f-estado": p["Estado"] || "Pendiente",
    "f-visita": p["Visita"] || "",
    "f-notas": p["Notas"] || ""
  };
  Object.entries(fields).forEach(([fid, val]) => {
    const el = document.getElementById(fid);
    if (el) el.value = val;
  });

  setValoracion(Number(p["Valoracion"] || 0));
  renderPhotoThumbs();
  document.getElementById("upload-progress").textContent = "";
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal() { document.getElementById("modal-overlay").classList.add("hidden"); }
function closeModalOnOverlay(e) { if (e.target.id === "modal-overlay") closeModal(); }

function setValoracion(n) {
  valoracion = n;
  document.querySelectorAll("#valoracion-stars span").forEach((s, i) => {
    s.classList.toggle("active", i < n);
  });
}

async function savePiso() {
  const pop = document.getElementById("f-poblacion").value.trim();
  if (!pop) { alert("La población es obligatoria"); return; }

  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Guardando…";

  // Upload new photos to Drive
  const newPhotos = currentPhotos.filter(p => p.isNew && p.file);
  if (newPhotos.length > 0) {
    document.getElementById("upload-progress").textContent = `Subiendo ${newPhotos.length} foto(s) a Drive…`;
    for (let i = 0; i < newPhotos.length; i++) {
      const ph = newPhotos[i];
      document.getElementById("upload-progress").textContent = `Subiendo foto ${i+1} de ${newPhotos.length}…`;
      try {
        const base64 = ph.localPreview.split(",")[1];
        const mimeType = ph.file.type;
        const fname = ph.file.name || "foto.jpg";
        const url = sheetUrl();
        if (url) {
          const res = await fetch(url, {
            method: "POST",
            body: JSON.stringify({ action: "uploadPhoto", base64, mimeType, fileName: fname })
          });
          const data = await res.json();
          if (data.url) {
            ph.url = data.url;
            ph.isNew = false;
          }
        }
      } catch(e) {
        console.error("Error subiendo foto:", e);
      }
    }
    document.getElementById("upload-progress").textContent = "";
  }

  const photoUrls = currentPhotos.map(p => p.url).filter(Boolean);
  const now = Date.now();
  const id = currentEditId || "p_" + now;

  const piso = {
    _id: id,
    _rowIndex: currentEditId ? (pisos.find(x => x._id === currentEditId)?._rowIndex) : undefined,
    "Poblacion": pop,
    "Barrio": document.getElementById("f-barrio").value,
    "Precio": document.getElementById("f-precio").value,
    "m2": document.getElementById("f-m2").value,
    "habitaciones": document.getElementById("f-habitaciones").value,
    "Terraza Si/No": document.getElementById("f-terraza").value,
    "Lavadero": document.getElementById("f-lavadero").value,
    "Parking Si/No": document.getElementById("f-parking").value,
    "Trastero Si/No": document.getElementById("f-trastero").value,
    "Ascensor": document.getElementById("f-ascensor").value,
    "Altura": document.getElementById("f-altura").value,
    "Estado": document.getElementById("f-estado").value,
    "Año": document.getElementById("f-anyo").value,
    "Agencia": document.getElementById("f-agencia").value,
    "Visita": document.getElementById("f-visita").value,
    "WEB": document.getElementById("f-web").value,
    "URL1": document.getElementById("f-url1").value,
    "URL2": document.getElementById("f-url2").value,
    "Notas": document.getElementById("f-notas").value,
    "Valoracion": valoracion || "",
    "Fotos": JSON.stringify(photoUrls)
  };

  if (currentEditId) {
    const idx = pisos.findIndex(x => x._id === currentEditId);
    if (idx >= 0) pisos[idx] = piso;
  } else {
    pisos.unshift(piso);
  }

  closeModal();
  populateFilters();
  renderCards();
  await pushToSheet(piso);

  btn.disabled = false;
  btn.textContent = "Guardar";
}

async function deleteCurrentPiso() {
  if (!currentEditId) return;
  if (!confirm("¿Eliminar este piso?")) return;
  const piso = pisos.find(x => x._id === currentEditId);
  pisos = pisos.filter(x => x._id !== currentEditId);
  closeModal();
  renderCards();
  if (piso) await deleteFromSheet(piso);
  saveLocal();
}

// ---- PHOTOS ----
function renderPhotoThumbs() {
  const c = document.getElementById("photo-thumbs");
  c.innerHTML = currentPhotos.map((ph, i) => {
    const src = ph.localPreview || ph.url;
    return `<div class="photo-thumb">
      <img src="${src}" alt="">
      <button onclick="removePhoto(${i})">✕</button>
    </div>`;
  }).join("");
}

function removePhoto(i) {
  currentPhotos.splice(i, 1);
  renderPhotoThumbs();
}

function addPhotoFromFile(file) {
  if (!file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentPhotos.push({ url: null, isNew: true, file, localPreview: e.target.result });
    renderPhotoThumbs();
  };
  reader.readAsDataURL(file);
}

function photoFileInput(e) { [...e.target.files].forEach(addPhotoFromFile); }
function photoDragOver(e) { e.preventDefault(); document.getElementById("photo-zone").classList.add("dragover"); }
function photoDragLeave() { document.getElementById("photo-zone").classList.remove("dragover"); }
function photoDrop(e) { e.preventDefault(); photoDragLeave(); [...e.dataTransfer.files].forEach(addPhotoFromFile); }
function handlePaste(e) {
  if (document.getElementById("modal-overlay").classList.contains("hidden")) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith("image/")) addPhotoFromFile(item.getAsFile());
  }
}

// ---- LIGHTBOX ----
function openLightbox(id) {
  const p = pisos.find(x => x._id === id);
  let photoUrls = [];
  try { photoUrls = JSON.parse(p?.["Fotos"] || "[]"); } catch(e) {}
  if (!photoUrls.length) { openModal(id); return; }
  lightboxPhotos = photoUrls;
  lightboxIdx = 0;
  document.getElementById("lightbox-img").src = lightboxPhotos[0];
  document.getElementById("lightbox").classList.remove("hidden");
}
function closeLightbox() { document.getElementById("lightbox").classList.add("hidden"); }
function lightboxPrev() {
  lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length;
  document.getElementById("lightbox-img").src = lightboxPhotos[lightboxIdx];
}
function lightboxNext() {
  lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length;
  document.getElementById("lightbox-img").src = lightboxPhotos[lightboxIdx];
}

document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("hidden")) {
    if (e.key === "ArrowLeft") lightboxPrev();
    if (e.key === "ArrowRight") lightboxNext();
    if (e.key === "Escape") closeLightbox();
  }
  if (!document.getElementById("modal-overlay").classList.contains("hidden") && e.key === "Escape") closeModal();
});

init();
</script>
